<html>
<head>
<style>
  body {
    background: black;
    margin: 0;
    padding: 0;
  }

  .marquee-container {
    width: 100%;
    overflow: hidden;
    white-space: nowrap;
    box-sizing: border-box;
  }

  .marquee-text {
    display: inline-block;
    color: crimson;
    font-family: sans-serif;
    font-weight: 900;
    font-size: 600px;

    /* Force instant animation start */
    will-change: transform;
    transform: translateZ(0);
    animation: marquee 20s linear infinite;
    animation-delay: -0.01s;
  }

  @keyframes marquee {
    0%   { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
  }
</style>
</head>

<body>
  <table>
    <tr>
      <td valign="top">
        <div class="marquee-container">
          <div class="marquee-text">
            CONGRATULATIONS!     YOU FOUND THE JASEMAN.COM SECRET SCROLLER!
          </div>
        </div>
      </td>
    </tr>
  </table>
</body>
</html>
